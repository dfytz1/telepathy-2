description: >
  Telepathy 2 — remote sender/receiver parameters that auto-wire by matching keys and group colors.
  Cmd+T / Ctrl+T: telepathify outputs or select a group; repeat to cycle the view through the group.
  Compatible with Grasshopper definitions built using the original Telepathy plugin (same component GUIDs).
